name: weather_app
description: A modern cross-platform Flutter weather app.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  http: ^1.2.2
  geolocator: ^13.0.1
  geocoding: ^3.0.0
  flutter_bloc: ^8.1.6
  intl: ^0.19.0
  weather_icons: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/backgrounds/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icons/app_icon.png
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: assets/icons/app_icon_foreground.png
  web:
    generate: true
    image_path: assets/icons/app_icon.png
    background_color: "#FFFFFF"
    theme_color: "#0EA5E9"
