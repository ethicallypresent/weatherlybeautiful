workflows:
  default-workflow:
    name: Default Workflow
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      vars:
        APP_BUNDLE_ID: "com.ethicallypresent.weatherlybeautiful"
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Build IPA
        script: flutter build ipa --release
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      testflight:
        submit: true
        apple_id: nathanaelvadnais@gmail.com    # ← CHANGE TO YOUR APPLE ID
        password: $APP_SPECIFIC_PASSWORD