name: weather_app
description: A modern cross-platform Flutter weather app.
publish_to: "none"

version: 1.0.1+2

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  http: ^1.2.2
  geolocator: ^13.0.1
  geocoding: ^3.0.0
  flutter_bloc: ^8.1.6
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.1

flutter:
  uses-material-design: true
  assets:
    - assets/backgrounds/
    - assets/icons/
    - assets/splash/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icons/app_icon.png
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: assets/icons/app_icon_foreground.png
  remove_alpha_ios: true

flutter_native_splash:
  color: "#0B1220"
  color_dark: "#050A13"
  image: assets/splash/weather_splash_logo.png
  image_dark: assets/splash/weather_splash_logo.png
  android_12:
    color: "#0B1220"
    color_dark: "#050A13"
    image: assets/splash/weather_splash_logo.png
    image_dark: assets/splash/weather_splash_logo.png
    icon_background_color: "#0EA5E9"
    icon_background_color_dark: "#0B5F87"
  web: false
