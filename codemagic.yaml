workflows:
  default-workflow:
    name: Default Workflow
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: $APP_STORE_CONNECT_INTEGRATION_NAME
    environment:
      flutter: stable
      xcode: latest
      vars:
        APP_BUNDLE_ID: "com.ethicallypresent.weatherapp"
        APP_STORE_CONNECT_INTEGRATION_NAME: ""
    scripts:
      - name: Clean iOS Build Artifacts
        script: |
          flutter clean
          rm -rf ios/Pods ios/Podfile.lock
      - name: Verify Runner Workspace and Scheme
        script: |
          test -f ios/Runner.xcworkspace/contents.xcworkspacedata
          xcodebuild -workspace ios/Runner.xcworkspace -list | grep -q "Runner"
      - name: Build iOS
        script: |
          flutter pub get
          cd ios
          pod install --repo-update
          cd ..
          flutter build ipa --release
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: false